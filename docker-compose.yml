services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./processing/pii_profiles.yaml:/app/processing/pii_profiles.yaml
    environment:
      - PYTHONUNBUFFERED=1
      - CHROMA_PATH=/app/data/chroma
      - DELTA_LAKE_PATH=/app/data/delta-lake
  # Future-proofing: We can add Kafka/Weaviate here later
  # vector-db:
  #   image: semitechnologies/weaviate:latest
  #   ...
